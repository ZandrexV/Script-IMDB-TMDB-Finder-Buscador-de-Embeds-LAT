<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Activa tu bloqueador de anuncios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#170A0B;
    --bg-2:#220E10;
    --line:#3A161A;
    --ink:#FBEEEE;
    --ink-dim:#C79A9C;
    --accent:#FF4D4D;
    --accent-dim:#B22C2C;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
  }
  body{
    font-family:'Lexend Deca', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(120% 140% at 15% 0%, var(--bg-2) 0%, var(--bg-1) 55%);
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .frame{
    width:100%;
    aspect-ratio:16/9;
    max-width:1280px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid var(--line);
  }
  /* patrón sutil de "anuncios bloqueados" al fondo */
  .noise{
    position:absolute;
    inset:0;
    background-image:
      repeating-linear-gradient(90deg, transparent 0 78px, rgba(255,77,77,0.05) 78px 79px),
      repeating-linear-gradient(0deg, transparent 0 78px, rgba(255,77,77,0.05) 78px 79px);
    pointer-events:none;
  }
  .glow{
    position:absolute;
    width:520px;height:520px;
    top:50%;left:50%;
    transform:translate(-50%,-58%);
    background:radial-gradient(circle, rgba(255,77,77,0.18) 0%, rgba(255,77,77,0) 70%);
    pointer-events:none;
  }
  .content{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding:6% 8%;
    gap:22px;
  }
  .shield{
    width:64px;height:64px;
    flex-shrink:0;
  }
  .eyebrow{
    font-size:clamp(11px,1.1vw,14px);
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
  }
  h1{
    font-size:clamp(20px,3vw,38px);
    line-height:1.35;
    font-weight:700;
    max-width:16ch;
    letter-spacing:-0.01em;
  }
  .accent-word{
    color:var(--accent);
  }
  .sub{
    font-size:clamp(12px,1.3vw,16px);
    color:var(--ink-dim);
    max-width:46ch;
    line-height:1.6;
  }
  .pulse{
    position:absolute;
    top:18px; right:18px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:11px;
    color:var(--ink-dim);
    letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .dot{
    width:8px;height:8px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 0 rgba(255,77,77,0.6);
    animation:ping 1.8s ease-out infinite;
  }
  @keyframes ping{
    0%{box-shadow:0 0 0 0 rgba(255,77,77,0.5);}
    70%{box-shadow:0 0 0 10px rgba(255,77,77,0);}
    100%{box-shadow:0 0 0 0 rgba(255,77,77,0);}
  }
  @media (prefers-reduced-motion: reduce){
    .dot{animation:none;}
  }

  .cta{
    margin-top:6px;
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:13px 26px;
    background:var(--accent);
    color:#170A0B;
    font-family:'Lexend Deca', sans-serif;
    font-weight:600;
    font-size:clamp(13px,1.3vw,15px);
    letter-spacing:0.01em;
    text-decoration:none;
    border-radius:8px;
    border:1px solid var(--accent);
    transition:background 0.15s ease, transform 0.15s ease;
  }
  .cta:hover{
    background:#FF6666;
    transform:translateY(-1px);
  }
  .cta:focus-visible{
    outline:2px solid var(--ink);
    outline-offset:3px;
  }
  .cta svg{
    width:16px;height:16px;
    flex-shrink:0;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="noise"></div>
    <div class="glow"></div>

    <div class="pulse"><span class="dot"></span>Protección activa requerida</div>

    <div class="content">
      <svg class="shield" viewBox="0 0 24 24" fill="none" stroke="#4CE0B3" stroke-width="1.4">
        <path d="M12 2.5 4 5.5v6c0 5 3.4 8.6 8 10 4.6-1.4 8-5 8-10v-6L12 2.5Z" stroke-linejoin="round"/>
        <path d="M9 12.2l2.1 2.1L15.5 10" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <div class="eyebrow">Antes de continuar</div>

      <h1>Necesitamos que utilices o actives tu <span class="accent-word">bloqueador de anuncios</span></h1>

      <p class="sub">Esto nos permite detener anuncios invasivos y mantener esta experiencia limpia y segura para ti.</p>

      <a class="cta" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="#170A0B" stroke-width="2">
          <path d="M12 5v14M5 12h14" stroke-linecap="round"/>
        </svg>
        Añadir extensión
      </a>
    </div>
  </div>
</body>
</html>
